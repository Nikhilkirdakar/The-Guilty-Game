[pytest]
# Root config: markers, default report output, and sane logging.

# Always emit a self-contained HTML report + terminal summary.
addopts =
    -ra
    --strict-markers
    --html=reports/report.html
    --self-contained-html

testpaths = tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    p0: launch-blocking priority tests
    p1: important priority tests
    functional: end-to-end functional flow
    localization: i18n / locale coverage
    smoke: fast sanity checks

# Live logging to the console during runs
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-7s | %(name)s | %(message)s
log_cli_date_format = %H:%M:%S
